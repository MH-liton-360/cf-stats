name: Update Stats

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install -g cf-stats leetcard

      - name: Generate Codeforces Stats
        run: cf-stats -u M-liton -o ./cf-stats/output

      - name: Generate LeetCode Stats
        run: leetcard -u Mahdi-H-liton -t dark -o ./leetcode-stats/output

      - name: Commit & Push
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add ./cf-stats/output ./leetcode-stats/output
          git commit -m "Update stats [skip ci]" || echo "No changes"
          git push
